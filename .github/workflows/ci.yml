name: ShipProof CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Adversarial rate-limit tests
        run: npm run test:rate-limit
      - name: Production build
        run: npm run build
